<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Successful</title>

<style>

/* 🌊 Animated Gradient */
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    background: linear-gradient(-45deg, #00c6ff, #0072ff, #00e5ff, #008cff);
    background-size: 400% 400%;
    animation: gradientFlow 10s ease infinite;
    overflow: hidden;
}

@keyframes gradientFlow {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* ⚪ Particle Layer */
body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(white 1px, transparent 1px);
    background-size: 60px 60px;
    opacity: 0.15;
    animation: moveParticles 25s linear infinite;
}

@keyframes moveParticles {
    from { transform: translate(0,0); }
    to { transform: translate(-300px, -300px); }
}

/* 💫 Orbs */
.orb {
    position: absolute;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(255,255,255,0.3), transparent);
    border-radius: 50%;
    animation: floatOrb 12s ease-in-out infinite;
    transition: transform 0.2s;
}

.orb:nth-child(1) { top: 10%; left: 20%; }
.orb:nth-child(2) { bottom: 15%; right: 25%; animation-delay: 3s; }

@keyframes floatOrb {
    0% {transform: translateY(0);}
    50% {transform: translateY(-30px);}
    100% {transform: translateY(0);}
}

/* 💎 Card */
.card {
    position: relative;
    text-align: center;
    background: rgba(0,0,0,0.45);
    padding: 40px;
    border-radius: 15px;
    backdrop-filter: blur(12px);
    box-shadow: 0 0 30px rgba(0,0,0,0.6);
    color: white;
    animation: pop 0.6s ease;
    transition: transform 0.2s ease;
    transform-style: preserve-3d;
}

@keyframes pop {
    from {transform: scale(0.7); opacity: 0;}
    to {transform: scale(1); opacity: 1;}
}

/* Glow */
.card::after {
    content: "";
    position: absolute;
    inset: -5px;
    border-radius: 15px;
    background: linear-gradient(45deg, #00e5ff, transparent);
    opacity: 0.3;
    filter: blur(20px);
}

/* ✅ Tick */
.tick svg {
    width: 80px;
    stroke: #00ffcc;
    stroke-width: 5;
    fill: none;
    stroke-dasharray: 100;
    stroke-dashoffset: 100;
    animation: drawTick 1s forwards ease-out;
}

@keyframes drawTick {
    to {stroke-dashoffset: 0;}
}

/* Text animation */
h1, p, button {
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.6s forwards;
}

h1 { animation-delay: 0.5s; }
p { animation-delay: 0.8s; }
button { animation-delay: 1.1s; }

@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Button */
button {
    margin-top: 20px;
    padding: 12px 20px;
    border: none;
    background: #00e5ff;
    color: black;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    box-shadow: 0 0 15px #00e5ff;
    transform: scale(1.05);
}

</style>

</head>

<body>

<div class="orb"></div>
<div class="orb"></div>

<div class="card" id="card">

</div>

<h1>Registration Successful!</h1>
<p>You have successfully registered for <b>Tech Manthan</b> 🎉</p>

<button onclick="window.location.href='/'">
    Back to Home
</button>
```

</div>

<!-- 🎉 Confetti -->

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
confetti({
    particleCount: 140,
    spread: 100,
    origin: { y: 0.6 }
});

// 🖱️ Mouse Interaction
const card = document.getElementById("card");
const orbs = document.querySelectorAll(".orb");

document.addEventListener("mousemove", (e) => {
    let x = (e.clientX / window.innerWidth - 0.5);
    let y = (e.clientY / window.innerHeight - 0.5);

    // Card tilt
    card.style.transform = `
        rotateY(${x * 10}deg)
        rotateX(${-y * 10}deg)
        scale(1)
    `;

    // Orbs follow
    orbs.forEach((orb, i) => {
        orb.style.transform = `
            translate(${x * (30 + i*20)}px, ${y * (30 + i*20)}px)
        `;
    });
});
</script>

</body>
</html>
